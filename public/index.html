<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心選叫貨流程追蹤系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1e40af;--primary-light:#dbeafe;--primary-hover:#1d4ed8;
  --header-bg:#1e293b;--sidebar-bg:#f8fafc;--border:#e2e8f0;
  --text:#1e293b;--text-sub:#64748b;--text-muted:#94a3b8;
  --overdue-bg:#fef2f2;--overdue-border:#ef4444;--overdue-text:#991b1b;--overdue-badge:#ef4444;
  --warn-bg:#fffbeb;--warn-border:#f59e0b;--warn-text:#92400e;--warn-badge:#f59e0b;
  --done-bg:#f0fdf4;--done-border:#86efac;--done-text:#166534;--done-badge:#22c55e;
  --r:8px;--shadow:0 1px 3px rgba(0,0,0,.1)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;
  background:#f1f5f9;color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.loading-overlay{position:fixed;inset:0;background:rgba(248,250,252,.96);z-index:1000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:var(--primary);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.9rem;color:var(--text-sub)}
header{background:var(--header-bg);color:#f1f5f9;padding:0 20px;height:54px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.h-title{font-size:1.05rem;font-weight:700;letter-spacing:.02em}
.h-title em{color:#93c5fd;font-style:normal}
.h-right{display:flex;align-items:center;gap:10px}
.conn-badge{font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.conn-ok{background:#dcfce7;color:#166534}
.conn-err{background:#fef2f2;color:#991b1b}
.conn-wait{background:#fef9c3;color:#854d0e}
.h-actions{display:flex;gap:7px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;
  border:none;cursor:pointer;font-size:.83rem;font-weight:500;transition:all .15s;
  white-space:nowrap;font-family:inherit;line-height:1.4}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-dark{background:#334155;color:#e2e8f0}.btn-dark:hover{background:#475569}
.btn-ghost{background:transparent;color:var(--text-sub);border:1px solid var(--border)}.btn-ghost:hover{background:#f1f5f9}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-sm{padding:4px 10px;font-size:.78rem}
.btn-xs{padding:2px 8px;font-size:.74rem}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.main-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:255px;flex-shrink:0;background:var(--sidebar-bg);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-hd{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.session-list{flex:1;overflow-y:auto;padding:8px}
.session-empty{text-align:center;padding:24px 12px;color:var(--text-muted);font-size:.8rem;line-height:1.6}
.s-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);
  cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all .15s;user-select:none}
.s-card:hover{background:#e9eef5}
.s-card.active{background:var(--primary-light);border-color:#93c5fd}
.s-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;flex-shrink:0;font-weight:700}
.ic-overdue{background:var(--overdue-badge);color:#fff}
.ic-warn{background:var(--warn-badge);color:#fff}
.ic-done{background:var(--done-badge);color:#fff}
.ic-normal{background:#94a3b8;color:#fff}
.s-info{flex:1;min-width:0}
.s-name{font-size:.88rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-date{font-size:.73rem;color:var(--text-muted);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:20px;min-width:0}
.empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text-muted);gap:12px;text-align:center}
.empty-main .icon{font-size:3rem}
.detail-hd{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.detail-title{font-size:1.25rem;font-weight:700}
.detail-meta{font-size:.82rem;color:var(--text-sub);margin-top:4px}
.detail-meta b{background:#e2e8f0;padding:2px 8px;border-radius:4px;font-weight:500}
.detail-actions{display:flex;gap:7px;flex-shrink:0;margin-left:12px}
.alert-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:var(--r);margin-bottom:16px;font-size:.85rem;font-weight:500}
.alert-overdue{background:#fef2f2;border:1px solid #fca5a5;color:var(--overdue-text)}
.alert-done{background:var(--done-bg);border:1px solid var(--done-border);color:var(--done-text)}
.progress-row{display:flex;gap:10px;margin-bottom:14px}
.p-stat{flex:1;text-align:center;padding:10px 6px;border-radius:var(--r);border:1px solid var(--border);background:#fff}
.p-num{font-size:1.4rem;font-weight:700}
.p-lbl{font-size:.7rem;color:var(--text-muted);margin-top:2px}
.pbar-wrap{background:#e2e8f0;border-radius:4px;height:6px;margin-bottom:18px;overflow:hidden}
.pbar-fill{height:100%;background:var(--done-badge);border-radius:4px;transition:width .4s}
.step-group{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow)}
.sg-hd{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;
  background:#f8fafc;border-bottom:1px solid var(--border)}
.sg-hd.ov{background:var(--overdue-bg);border-bottom-color:#fecaca}
.sg-hd.wn{background:var(--warn-bg);border-bottom-color:#fde68a}
.sg-hd.dn{background:var(--done-bg);border-bottom-color:#bbf7d0}
.sg-name{font-weight:600;font-size:.9rem}
.sg-dl{font-size:.76rem;color:var(--text-sub);margin-top:2px}
.badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap}
.badge-ov{background:var(--overdue-badge);color:#fff}
.badge-wn{background:var(--warn-badge);color:#fff}
.badge-dn{background:var(--done-badge);color:#fff}
.badge-nm{background:#94a3b8;color:#fff}
.step-items{padding:8px;display:flex;flex-direction:column;gap:5px}
.step-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;
  border:1px solid var(--border);background:#fff;cursor:pointer;
  transition:all .15s;user-select:none}
.step-item:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.step-item.ov{background:var(--overdue-bg);border-color:var(--overdue-border)}
.step-item.wn{background:var(--warn-bg);border-color:var(--warn-border)}
.step-item.dn{background:var(--done-bg);border-color:var(--done-border)}
.chk{width:20px;height:20px;border-radius:4px;border:2px solid #cbd5e1;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.72rem;transition:all .15s}
.chk.ov{border-color:var(--overdue-badge)}
.chk.wn{border-color:var(--warn-badge)}
.chk.dn{background:var(--done-badge);border-color:var(--done-badge);color:#fff}
.step-info{flex:1;min-width:0}
.step-name{font-size:.88rem;font-weight:500}
.step-name.dn{text-decoration:line-through;color:var(--done-text)}
.step-owner{font-size:.73rem;color:var(--text-muted);margin-top:1px}
.step-done-at{font-size:.72rem;color:var(--done-text);margin-top:1px}
.step-tag{font-size:.71rem;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.tag-ov{background:var(--overdue-badge);color:#fff}
.tag-wn{background:var(--warn-badge);color:#fff}
.tag-dn{background:var(--done-badge);color:#fff}
.bottom-bar{height:46px;background:#fff;border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;justify-content:flex-end;flex-shrink:0}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none}
.drawer-bg.open{display:block}
.drawer{position:fixed;left:0;right:0;bottom:0;height:78vh;background:#fff;
  border-radius:16px 16px 0 0;z-index:101;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.drawer.open{transform:translateY(0)}
.drawer-hd{padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-title{font-size:1rem;font-weight:700}
.drawer-body{flex:1;overflow-y:auto;padding:14px 20px}
.sop-group{border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.sop-g-hd{padding:10px 14px;background:#f8fafc;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border)}
.sop-g-title{font-weight:600;font-size:.88rem}
.sop-g-sub{font-size:.76rem;color:var(--text-muted);margin-top:2px}
.sop-g-actions{display:flex;gap:5px}
.sop-steps{padding:8px}
.sop-step{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;
  border:1px solid var(--border);margin-bottom:6px;background:#fff}
.sop-step-num{width:20px;height:20px;border-radius:50%;background:#e2e8f0;color:var(--text-sub);
  font-size:.7rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.sop-step-info{flex:1;min-width:0}
.sop-step-name{font-size:.83rem;font-weight:500}
.sop-step-owner{font-size:.73rem;color:var(--text-muted)}
.sop-step-actions{display:flex;gap:4px}
.sop-add-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;
  padding:7px;border:1px dashed #cbd5e1;border-radius:6px;background:transparent;
  color:var(--text-muted);font-size:.8rem;cursor:pointer;transition:all .15s;font-family:inherit}
.sop-add-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:420px;
  max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:13px}
.form-label{display:block;font-size:.83rem;font-weight:500;color:var(--text-sub);margin-bottom:5px}
.form-input{width:100%;padding:8px 11px;border:1px solid #cbd5e1;border-radius:6px;
  font-size:.88rem;font-family:inherit;transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,64,175,.1)}
.input-row{display:flex;gap:8px}
.input-row .form-input{flex:1}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:.85rem;
  z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
/* ====== Mobile ====== */
.mobile-back{display:none}
@media(max-width:640px){
  header{height:auto;min-height:48px;padding:8px 12px;flex-wrap:wrap;gap:4px}
  .h-title{font-size:.9rem}
  .h-right{gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .conn-badge{display:none}
  .h-actions .btn{padding:5px 9px;font-size:.76rem}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .main-layout.mobile-detail .sidebar{display:none}
  .main-layout:not(.mobile-detail) .content{display:none}
  .mobile-back{display:flex;align-items:center;gap:6px;padding:10px 0 8px;
    font-size:.88rem;color:var(--primary);cursor:pointer;font-weight:600;border:none;
    background:transparent;font-family:inherit;width:100%}
  .content{padding:12px}
  .progress-row{flex-wrap:wrap}
  .p-stat{flex:0 0 calc(50% - 5px)}
  .p-num{font-size:1.2rem}
  .step-item{padding:12px 10px;min-height:48px}
  .step-name{font-size:.85rem}
  .step-tag{font-size:.68rem;padding:2px 6px}
  .detail-hd{flex-direction:column;gap:8px}
  .detail-actions{margin-left:0;justify-content:flex-start}
  .detail-title{font-size:1rem}
  .sg-name{font-size:.84rem}
  .sg-dl{font-size:.72rem}
  .badge{font-size:.68rem;padding:2px 8px}
  .bottom-bar{padding:0 12px}
  .toast{bottom:60px;max-width:88vw;white-space:normal;text-align:center}
  .modal-box{max-width:95vw;padding:18px}
  .s-card{padding:12px}
  .s-name{font-size:.9rem}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">連線至資料庫中...</div>
</div>

<header>
  <div class="h-title">心選<em>叫貨流程</em>追蹤系統</div>
  <div class="h-right">
    <span class="conn-badge conn-wait" id="connBadge">● 連線中</span>
    <div class="h-actions">
      <button class="btn btn-dark" onclick="exportData()">↑ 匯出</button>
      <button class="btn btn-dark" onclick="document.getElementById('importInput').click()">↓ 匯入</button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</header>

<div class="main-layout" id="mainLayout">
  <aside class="sidebar">
    <div class="sidebar-hd">
      <button class="btn btn-primary btn-full" onclick="openSessionModal()">＋ 新增場次</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </aside>
  <main class="content" id="mainContent"></main>
</div>

<div class="bottom-bar">
  <button class="btn btn-ghost" onclick="toggleDrawer()">⚙ SOP 步驟設定</button>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hd">
    <div class="drawer-title">⚙ SOP 步驟設定</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="openGroupModal()">＋ 新增步驟組</button>
      <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">✕ 關閉</button>
    </div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal-box" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://ijnjfpxthoewpwyuzela.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbmpmcHh0aG9ld3B3eXV6ZWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTc4MDksImV4cCI6MjA5MTc5MzgwOX0.kiyAtaVDUFlaV1pWzAMGyfdMuh4GScO8o47CtjnRYy8';
const{createClient}=window.supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

let appData={sopTemplate:[],sessions:[]};
let selId=null,drawerOpen=false,pendingSelId=null;

async function loadFromDB(){
  const[grpRes,stpRes,sesRes,prRes]=await Promise.all([
    db.from('sop_groups').select('*').order('offset_hours'),
    db.from('sop_steps').select('*').order('sort_order'),
    db.from('sessions').select('*').order('live_date',{ascending:false}),
    db.from('session_progress').select('*')
  ]);
  const groups=grpRes.data||[],steps=stpRes.data||[],sessions=sesRes.data||[],progress=prRes.data||[];
  appData.sopTemplate=groups.map(g=>({
    groupId:g.id,groupName:g.group_name,offsetHours:parseFloat(g.offset_hours),
    steps:steps.filter(s=>s.group_id===g.id).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))
      .map(s=>({stepId:s.id,name:s.name,owner:s.owner||'',order:s.sort_order}))
  }));
  appData.sessions=sessions.map(s=>{
    const prog={};
    progress.filter(p=>p.session_id===s.id&&p.completed)
      .forEach(p=>{prog[p.step_id]={completed:true,completedAt:p.completed_at,note:p.note||''};});
    return{sessionId:s.id,name:s.name,liveDate:s.live_date,progress:prog};
  });
  if(pendingSelId){selId=pendingSelId;pendingSelId=null;}
  if(selId&&!appData.sessions.find(s=>s.sessionId===selId))selId=null;
  if(!selId&&appData.sessions.length)selId=appData.sessions[0].sessionId;
}

function setupRealtime(){
  const reload=()=>loadFromDB().then(render);
  db.channel('sop-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'sop_groups'},reload)
    .on('postgres_changes',{event:'*',schema:'public',table:'sop_steps'},reload)
    .on('postgres_changes',{event:'*',schema:'public',table:'sessions'},reload)
    .on('postgres_changes',{event:'*',schema:'public',table:'session_progress'},reload)
    .subscribe(status=>{
      const b=document.getElementById('connBadge');
      if(status==='SUBSCRIBED'){b.textContent='● 即時同步中';b.className='conn-badge conn-ok';}
      else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){b.textContent='● 連線中斷';b.className='conn-badge conn-err';}
      else{b.textContent='● 連線中';b.className='conn-badge conn-wait';}
    });
}

function stepStatus(stepId,group,session){
  const p=session.progress&&session.progress[stepId];
  if(p&&p.completed)return{s:'DONE',at:p.completedAt};
  const deadline=new Date(session.liveDate).getTime()+group.offsetHours*3600000,now=Date.now();
  if(now>deadline)return{s:'OVERDUE',h:(now-deadline)/3600000};
  if(deadline-now<4*3600000)return{s:'WARN',h:(deadline-now)/3600000};
  return{s:'OK'};
}
function groupStatus(group,session){
  const steps=group.steps||[];if(!steps.length)return'OK';
  let done=0,ov=false,wn=false;
  for(const st of steps){const r=stepStatus(st.stepId,group,session);
    if(r.s==='DONE')done++;else if(r.s==='OVERDUE')ov=true;else if(r.s==='WARN')wn=true;}
  if(done===steps.length)return'DONE';if(ov)return'OVERDUE';if(wn)return'WARN';return'OK';
}
function sessionStatus(session){
  let ov=false,wn=false,total=0,done=0;
  for(const g of appData.sopTemplate)for(const st of g.steps){
    total++;const r=stepStatus(st.stepId,g,session);
    if(r.s==='DONE')done++;else if(r.s==='OVERDUE')ov=true;else if(r.s==='WARN')wn=true;
  }
  if(total>0&&done===total)return'DONE';if(ov)return'OVERDUE';if(wn)return'WARN';return'OK';
}

function fmtOffset(h){return h%24===0?`${h/24} 天後`:`${h} 小時後`}
function fmtDt(iso){const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function fmtDeadline(liveDate,h){return fmtDt(new Date(new Date(liveDate).getTime()+h*3600000).toISOString())}
function fmtDur(h){const tot=Math.floor(h*60),hr=Math.floor(tot/60),mi=tot%60;if(hr===0)return`${mi} 分鐘`;if(hr<24)return mi>0?`${hr} 小時 ${mi} 分`:`${hr} 小時`;const d=Math.floor(hr/24),rh=hr%24;return rh===0?`${d} 天`:`${d} 天 ${rh} 小時`;}
function fmtShort(iso){const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function dtLocal(iso){const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;}
function genId(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function ea(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function renderList(){
  const el=document.getElementById('sessionList');
  if(!appData.sessions.length){el.innerHTML=`<div class="session-empty">尚無場次<br>點擊上方按鈕新增</div>`;return;}
  el.innerHTML=appData.sessions.map(s=>{
    const st=sessionStatus(s);
    const[ic,cls]={OVERDUE:['!','ic-overdue'],WARN:['~','ic-warn'],DONE:['✓','ic-done'],OK:['●','ic-normal']}[st]||['●','ic-normal'];
    return`<div class="s-card${s.sessionId===selId?' active':''}" onclick="selSession('${s.sessionId}')">
      <div class="s-icon ${cls}">${ic}</div>
      <div class="s-info"><div class="s-name">${esc(s.name)}</div><div class="s-date">${fmtDt(s.liveDate)}</div></div>
    </div>`;
  }).join('');
}

function renderMain(){
  const el=document.getElementById('mainContent');
  if(!selId){el.innerHTML=`<div class="empty-main"><div class="icon">📋</div><p>請從左側選擇場次<br>或點擊「新增場次」開始追蹤</p></div>`;return;}
  const session=appData.sessions.find(s=>s.sessionId===selId);
  if(!session){selId=null;renderMain();return;}
  const groups=[...appData.sopTemplate].sort((a,b)=>a.offsetHours-b.offsetHours);
  let total=0,done=0,overdue=0;
  for(const g of groups)for(const st of g.steps){total++;const r=stepStatus(st.stepId,g,session);if(r.s==='DONE')done++;else if(r.s==='OVERDUE')overdue++;}
  const pct=total?Math.round(done/total*100):0,allDone=total>0&&done===total;
  let banner='';
  if(allDone)banner=`<div class="alert-banner alert-done">✅ 此場次所有步驟已全部完成！</div>`;
  else if(overdue>0)banner=`<div class="alert-banner alert-overdue">⚠ 此場次有 ${overdue} 個步驟已超過截止時間！</div>`;
  el.innerHTML=`<button class="mobile-back" onclick="showMobileList()">← 返回場次列表</button><div class="detail-hd">
    <div><div class="detail-title">${esc(session.name)}</div>
      <div class="detail-meta"><b>📅 直播日：${fmtDt(session.liveDate)}</b></div></div>
    <div class="detail-actions">
      <button class="btn btn-ghost btn-sm" onclick="openSessionModal('${session.sessionId}')">✏ 編輯</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDel('${session.sessionId}')">✕ 刪除</button>
    </div></div>
  ${banner}
  <div class="progress-row">
    <div class="p-stat" style="border-color:#22c55e"><div class="p-num" style="color:#22c55e">${done}</div><div class="p-lbl">已完成</div></div>
    <div class="p-stat" style="border-color:#ef4444"><div class="p-num" style="color:#ef4444">${overdue}</div><div class="p-lbl">超時待辦</div></div>
    <div class="p-stat" style="border-color:#6366f1"><div class="p-num" style="color:#6366f1">${total-done}</div><div class="p-lbl">未完成</div></div>
    <div class="p-stat"><div class="p-num">${pct}%</div><div class="p-lbl">完成率</div></div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
  ${groups.map((g,i)=>renderGroup(g,session,i+1)).join('')}`;
}

function renderGroup(group,session,idx){
  const gs=groupStatus(group,session);
  const hd={OVERDUE:['sg-hd ov','badge badge-ov','⚠ 逾期'],WARN:['sg-hd wn','badge badge-wn','⏰ 即將到期'],DONE:['sg-hd dn','badge badge-dn','✓ 已完成'],OK:['sg-hd','badge badge-nm','進行中']};
  const[hdCls,bdgCls,bdgTxt]=hd[gs]||hd.OK;
  const steps=[...group.steps].sort((a,b)=>(a.order||0)-(b.order||0));
  return`<div class="step-group"><div class="${hdCls}">
    <div><div class="sg-name">第 ${idx} 組：${esc(group.groupName||'')}（直播 ${fmtOffset(group.offsetHours)}）</div>
      <div class="sg-dl">📅 截止：${fmtDeadline(session.liveDate,group.offsetHours)}</div></div>
    <span class="${bdgCls}">${bdgTxt}</span></div>
    <div class="step-items">${steps.map(st=>renderStep(st,group,session)).join('')}</div>
  </div>`;
}
function renderStep(step,group,session){
  const r=stepStatus(step.stepId,group,session);
  let ic='',cc='',nc='',tag='',extra='';
  if(r.s==='DONE'){ic='✓';cc='dn';nc='dn';tag=`<span class="step-tag tag-dn">已完成</span>`;extra=`<div class="step-done-at">完成於 ${fmtShort(r.at)}</div>`;}
  else if(r.s==='OVERDUE'){cc='ov';tag=`<span class="step-tag tag-ov">⚠ 逾期 ${fmtDur(r.h)}</span>`;}
  else if(r.s==='WARN'){cc='wn';tag=`<span class="step-tag tag-wn">⏰ ${fmtDur(r.h)}後截止</span>`;}
  return`<div class="step-item${r.s==='OVERDUE'?' ov':r.s==='WARN'?' wn':r.s==='DONE'?' dn':''}" onclick="toggleStep('${session.sessionId}','${step.stepId}')">
    <div class="chk ${cc}">${ic}</div>
    <div class="step-info"><div class="step-name ${nc}">${esc(step.name)}</div>
      ${step.owner?`<div class="step-owner">👤 ${esc(step.owner)}</div>`:''}${extra}</div>
    ${tag}</div>`;
}

function renderDrawer(){
  const el=document.getElementById('drawerBody');
  const groups=[...appData.sopTemplate].sort((a,b)=>a.offsetHours-b.offsetHours);
  if(!groups.length){el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--text-muted)">尚無步驟組</div>`;return;}
  el.innerHTML=groups.map((g,i)=>{
    const steps=[...g.steps].sort((a,b)=>(a.order||0)-(b.order||0));
    return`<div class="sop-group"><div class="sop-g-hd">
      <div><div class="sop-g-title">第 ${i+1} 組：${esc(g.groupName||'')}（${steps.length} 個步驟）</div>
        <div class="sop-g-sub">截止：直播 ${fmtOffset(g.offsetHours)}</div></div>
      <div class="sop-g-actions">
        <button class="btn btn-ghost btn-xs" onclick="openGroupModal('${g.groupId}')">✏ 編輯</button>
        <button class="btn btn-danger btn-xs" onclick="confirmDelGroup('${g.groupId}')">✕</button>
      </div></div>
      <div class="sop-steps">
        ${steps.map((st,si)=>`<div class="sop-step">
          <div class="sop-step-num">${si+1}</div>
          <div class="sop-step-info"><div class="sop-step-name">${esc(st.name)}</div>
            <div class="sop-step-owner">${st.owner?'👤 '+esc(st.owner):'（無負責人）'}</div></div>
          <div class="sop-step-actions">
            <button class="btn btn-ghost btn-xs" onclick="openStepModal('${g.groupId}','${st.stepId}')">✏</button>
            <button class="btn btn-danger btn-xs" onclick="confirmDelStep('${g.groupId}','${st.stepId}')">✕</button>
          </div></div>`).join('')}
        <button class="sop-add-btn" onclick="openStepModal('${g.groupId}')">＋ 在此組新增步驟</button>
      </div></div>`;
  }).join('');
}

function render(){renderList();renderMain();if(drawerOpen)renderDrawer();}

function selSession(id){selId=id;if(window.innerWidth<=640)document.getElementById('mainLayout').classList.add('mobile-detail');render();}
function showMobileList(){document.getElementById('mainLayout').classList.remove('mobile-detail');}

function openSessionModal(sid){
  const s=sid?appData.sessions.find(x=>x.sessionId===sid):null;
  openModal(`<div class="modal-title">${s?'編輯場次':'新增直播場次'}</div>
    <div class="form-group"><label class="form-label">場次名稱 *</label>
      <input class="form-input" id="f-name" placeholder="例：2026-04-15 春季直播" value="${s?ea(s.name):''}"></div>
    <div class="form-group"><label class="form-label">直播日期時間 *</label>
      <input class="form-input" type="datetime-local" id="f-date" value="${s?dtLocal(s.liveDate):''}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveSession('${sid||''}')">儲存</button>
    </div>`);
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}
async function saveSession(sid){
  const name=document.getElementById('f-name').value.trim(),dv=document.getElementById('f-date').value;
  if(!name){alert('請輸入場次名稱');return;}if(!dv){alert('請選擇直播日期時間');return;}
  setBtnLoading('saveBtn',true);
  const liveDate=new Date(dv).toISOString();
  if(sid){await db.from('sessions').update({name,live_date:liveDate}).eq('id',sid);}
  else{const id=genId();pendingSelId=id;await db.from('sessions').insert({id,name,live_date:liveDate});}
  closeModal();await loadFromDB();render();
}
function confirmDel(sid){
  const s=appData.sessions.find(x=>x.sessionId===sid);if(!s)return;
  openModal(`<div class="modal-title" style="color:#ef4444">⚠ 刪除場次</div>
    <p style="font-size:.875rem;color:#475569;margin-bottom:16px">確定要刪除「${esc(s.name)}」嗎？此操作無法還原。</p>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="delSession('${sid}')">確認刪除</button></div>`);
}
async function delSession(sid){
  await db.from('sessions').delete().eq('id',sid);
  if(selId===sid)selId=null;closeModal();await loadFromDB();render();
}

async function toggleStep(sessionId,stepId){
  const session=appData.sessions.find(s=>s.sessionId===sessionId);if(!session)return;
  const isDone=session.progress[stepId]?.completed;
  if(isDone)delete session.progress[stepId];
  else session.progress[stepId]={completed:true,completedAt:new Date().toISOString()};
  render();
  if(isDone){await db.from('session_progress').delete().eq('session_id',sessionId).eq('step_id',stepId);}
  else{await db.from('session_progress').upsert({session_id:sessionId,step_id:stepId,completed:true,completed_at:new Date().toISOString(),note:''},{onConflict:'session_id,step_id'});}
  showToast(isDone?'已取消完成':'已標記完成 ✓');
}

function toggleDrawer(){
  drawerOpen=!drawerOpen;
  document.getElementById('drawerBg').classList.toggle('open',drawerOpen);
  document.getElementById('drawer').classList.toggle('open',drawerOpen);
  if(drawerOpen)renderDrawer();
}
function closeDrawer(){drawerOpen=false;document.getElementById('drawerBg').classList.remove('open');document.getElementById('drawer').classList.remove('open');}

function openGroupModal(gid){
  const g=gid?appData.sopTemplate.find(x=>x.groupId===gid):null;
  let val='',unit='days';
  if(g){val=g.offsetHours%24===0?g.offsetHours/24:g.offsetHours;unit=g.offsetHours%24===0?'days':'hours';}
  openModal(`<div class="modal-title">${g?'編輯步驟組':'新增步驟組'}</div>
    <div class="form-group"><label class="form-label">步驟組名稱 *</label>
      <input class="form-input" id="f-gname" value="${g?ea(g.groupName||''):''}"></div>
    <div class="form-group"><label class="form-label">截止時間（距直播日）*</label>
      <div class="input-row">
        <input class="form-input" type="number" id="f-gval" min="1" step="0.5" value="${val}">
        <select class="form-input" id="f-gunit" style="flex:0 0 80px">
          <option value="hours"${unit==='hours'?' selected':''}>小時</option>
          <option value="days"${unit==='days'?' selected':''}>天</option>
        </select></div></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveGroup('${gid||''}')">儲存</button></div>`);
  setTimeout(()=>document.getElementById('f-gname').focus(),50);
}
async function saveGroup(gid){
  const name=document.getElementById('f-gname').value.trim(),v=parseFloat(document.getElementById('f-gval').value),unit=document.getElementById('f-gunit').value;
  if(!name){alert('請輸入步驟組名稱');return;}if(!v||v<=0){alert('請輸入有效的截止時間');return;}
  const h=unit==='days'?v*24:v;setBtnLoading('saveBtn',true);
  if(gid){await db.from('sop_groups').update({group_name:name,offset_hours:h}).eq('id',gid);}
  else{await db.from('sop_groups').insert({id:genId(),group_name:name,offset_hours:h,sort_order:h});}
  closeModal();await loadFromDB();render();if(drawerOpen)renderDrawer();
}
function confirmDelGroup(gid){
  const g=appData.sopTemplate.find(x=>x.groupId===gid);if(!g)return;
  openModal(`<div class="modal-title" style="color:#ef4444">⚠ 刪除步驟組</div>
    <p style="font-size:.875rem;color:#475569;margin-bottom:16px">確定要刪除「${esc(g.groupName||'')}」？組內所有步驟也將一併刪除。</p>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="delGroup('${gid}')">確認刪除</button></div>`);
}
async function delGroup(gid){
  await db.from('sop_groups').delete().eq('id',gid);
  closeModal();await loadFromDB();render();if(drawerOpen)renderDrawer();
}

function openStepModal(gid,sid){
  const g=appData.sopTemplate.find(x=>x.groupId===gid);if(!g)return;
  const st=sid?g.steps.find(x=>x.stepId===sid):null;
  openModal(`<div class="modal-title">${st?'編輯步驟':'新增步驟'}</div>
    <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:12px">步驟組：${esc(g.groupName||'')}（直播 ${fmtOffset(g.offsetHours)}）</div>
    <div class="form-group"><label class="form-label">步驟名稱 *</label>
      <input class="form-input" id="f-sname" value="${st?ea(st.name):''}"></div>
    <div class="form-group"><label class="form-label">負責人（可留空）</label>
      <input class="form-input" id="f-sowner" value="${st?ea(st.owner||''):''}"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveStep('${gid}','${sid||''}')">儲存</button></div>`);
  setTimeout(()=>document.getElementById('f-sname').focus(),50);
}
async function saveStep(gid,sid){
  const name=document.getElementById('f-sname').value.trim(),owner=document.getElementById('f-sowner').value.trim();
  if(!name){alert('請輸入步驟名稱');return;}setBtnLoading('saveBtn',true);
  if(sid){await db.from('sop_steps').update({name,owner}).eq('id',sid);}
  else{const g=appData.sopTemplate.find(x=>x.groupId===gid);const maxOrd=g?g.steps.reduce((m,s)=>Math.max(m,s.order||0),0):0;
    await db.from('sop_steps').insert({id:genId(),group_id:gid,name,owner,sort_order:maxOrd+1});}
  closeModal();await loadFromDB();render();if(drawerOpen)renderDrawer();
}
function confirmDelStep(gid,sid){
  const g=appData.sopTemplate.find(x=>x.groupId===gid),st=g?g.steps.find(x=>x.stepId===sid):null;if(!st)return;
  openModal(`<div class="modal-title" style="color:#ef4444">⚠ 刪除步驟</div>
    <p style="font-size:.875rem;color:#475569;margin-bottom:16px">確定要刪除「${esc(st.name)}」嗎？</p>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="delStep('${sid}')">確認刪除</button></div>`);
}
async function delStep(sid){
  await db.from('sop_steps').delete().eq('id',sid);
  closeModal();await loadFromDB();render();if(drawerOpen)renderDrawer();
}

function exportData(){
  const json=JSON.stringify(appData,null,2),blob=new Blob(['\uFEFF'+json],{type:'application/json;charset=utf-8'}),url=URL.createObjectURL(blob);
  const d=new Date(),p=n=>String(n).padStart(2,'0'),a=document.createElement('a');
  a.href=url;a.download=`心選叫貨_備份_${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}.json`;
  a.click();URL.revokeObjectURL(url);
}
async function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(!imp.sessions){alert('格式不正確');return;}
      if(!confirm(`備份中有 ${imp.sessions.length} 個場次，是否匯入？\n（已存在的場次 ID 將略過）`))return;
      const existIds=new Set(appData.sessions.map(s=>s.sessionId));
      const toInsert=imp.sessions.filter(s=>!existIds.has(s.sessionId));
      for(const s of toInsert){
        await db.from('sessions').insert({id:s.sessionId,name:s.name,live_date:s.liveDate});
        for(const[stepId,p] of Object.entries(s.progress||{})){
          if(p.completed)await db.from('session_progress').insert({session_id:s.sessionId,step_id:stepId,completed:true,completed_at:p.completedAt,note:p.note||''});
        }
      }
      await loadFromDB();render();showToast(`匯入完成，共新增 ${toInsert.length} 個場次`);
    }catch(err){alert('匯入失敗：'+err.message);}
    event.target.value='';
  };
  reader.readAsText(file,'UTF-8');
}

function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalBg').classList.add('open');}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();if(drawerOpen)closeDrawer();}});
function setBtnLoading(id,on){const btn=document.getElementById(id);if(btn){btn.disabled=on;btn.textContent=on?'處理中...':'儲存';}}
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}
function hideLoading(){const el=document.getElementById('loadingOverlay');if(el){el.style.opacity='0';el.style.transition='opacity .4s';setTimeout(()=>el.remove(),400);}}

(async()=>{
  await loadFromDB();
  hideLoading();
  render();
  setupRealtime();
  setInterval(()=>loadFromDB().then(render),30000);
})();
</script>
</body>
</html>
