<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>心選叫貨進度看板</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1e40af;--header-bg:#1e293b;--border:#e2e8f0;
  --text:#1e293b;--text-sub:#64748b;--text-muted:#94a3b8;
  --r:6px;--label-w:148px;--bar-h:34px;--row-v:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;
  background:#f1f5f9;color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(248,250,252,.96);z-index:1000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:var(--primary);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.9rem;color:var(--text-sub)}

/* Header */
header{background:var(--header-bg);color:#f1f5f9;padding:0 20px;height:54px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:20;position:sticky;top:0}
.h-title{font-size:1.05rem;font-weight:700;letter-spacing:.02em}
.h-title em{color:#93c5fd;font-style:normal}
.h-right{display:flex;align-items:center;gap:10px}
.conn-badge{font-size:.72rem;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.conn-ok{background:#dcfce7;color:#166534}
.conn-err{background:#fef2f2;color:#991b1b}
.conn-wait{background:#fef9c3;color:#854d0e}
.update-time{font-size:.72rem;color:#94a3b8}
.h-link{font-size:.78rem;color:#93c5fd;text-decoration:none;padding:5px 11px;
  border:1px solid #475569;border-radius:6px;transition:background .15s;white-space:nowrap}
.h-link:hover{background:#334155}

/* Board wrap */
.board-wrap{flex:1;padding:16px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;color:var(--text-muted);gap:14px;text-align:center}
.empty-state .icon{font-size:3rem}
.empty-state p{font-size:.9rem;line-height:1.7}

/* ===== GANTT BOARD ===== */
.board{background:#fff;border-radius:10px;border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.08);overflow-x:auto}

/* Date header row */
.gantt-header{display:flex;border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:15;background:#fff}
.header-label{width:var(--label-w);min-width:var(--label-w);padding:9px 12px;
  font-size:.73rem;font-weight:600;color:var(--text-sub);background:#f8fafc;
  border-right:1px solid var(--border);position:sticky;left:0;z-index:16;
  display:flex;align-items:center}
.header-dates{position:relative;flex:1}
.date-tick{position:absolute;top:0;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;border-left:1px solid #f1f5f9}
.dt-day{font-size:.72rem;font-weight:600;color:var(--text)}
.dt-wd{font-size:.62rem;color:var(--text-muted)}
.date-tick.is-today .dt-day{color:var(--primary);font-weight:800}
.date-tick.is-today .dt-wd{color:var(--primary)}
.date-tick.is-today{border-left:2px solid #ef4444}
.date-tick.is-weekend .dt-day{color:#94a3b8}

/* Session rows */
.gantt-row{display:flex;border-bottom:1px solid #f1f5f9;
  cursor:pointer;transition:background .1s}
.gantt-row:hover .row-label,.gantt-row:hover .row-bars{background:#f8fbff}
.gantt-row.expanded .row-label,.gantt-row.expanded .row-bars{background:#eff6ff}
.gantt-row:last-of-type{border-bottom:none}

.row-label{width:var(--label-w);min-width:var(--label-w);padding:var(--row-v) 12px;
  border-right:1px solid var(--border);position:sticky;left:0;z-index:5;
  background:#fff;transition:background .1s;display:flex;flex-direction:column;gap:3px}
.rl-name{font-size:.86rem;font-weight:600;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rl-date{font-size:.7rem;color:var(--text-muted)}
.rl-day{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 8px;
  border-radius:10px;margin-top:2px;width:fit-content}
.rl-day.d-normal{background:#dbeafe;color:#1d4ed8}
.rl-day.d-warn{background:#fef3c7;color:#b45309}
.rl-day.d-overdue{background:#fee2e2;color:#dc2626}
.rl-day.d-future{background:#f1f5f9;color:#64748b}
.rl-day.d-live{background:#dcfce7;color:#15803d}
.rl-chevron{font-size:.65rem;color:var(--text-muted);margin-top:2px;transition:transform .2s}
.gantt-row.expanded .rl-chevron{transform:rotate(180deg)}

.row-bars{flex:1;position:relative;padding:var(--row-v) 0;background:#fff;transition:background .1s}

/* Phase bars */
.phase-bar{position:absolute;top:var(--row-v);height:var(--bar-h);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:1px solid transparent;transition:filter .15s;pointer-events:none}
.bar-lbl{font-size:.68rem;font-weight:600;padding:0 5px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center}
/* Colors */
.bc-future{background:#e2e8f0;border-color:#cbd5e1;color:#64748b}
.bc-normal{background:#bfdbfe;border-color:#93c5fd;color:#1e40af}
.bc-warn  {background:#fde68a;border-color:#fbbf24;color:#854d0e}
.bc-overdue{background:#fca5a5;border-color:#f87171;color:#991b1b}
.bc-done  {background:#bbf7d0;border-color:#4ade80;color:#166534}

/* Today vertical line */
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;
  opacity:.75;pointer-events:none;z-index:4}
.header-today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;opacity:.6}

/* Expand panel */
.expand-panel{display:none;border-bottom:1px solid var(--border);background:#f0f6ff}
.expand-panel.open{display:block}
.expand-inner{padding:14px 16px 16px calc(var(--label-w) + 0px)}
.exp-group{margin-bottom:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.exp-group:last-child{margin-bottom:0}
.exp-g-hd{padding:8px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  background:#f8fafc;border-bottom:1px solid var(--border)}
.exp-g-title{font-size:.82rem;font-weight:600;line-height:1.3}
.exp-g-dl{font-size:.68rem;color:var(--text-muted);margin-top:2px}
.badge{padding:2px 9px;border-radius:10px;font-size:.68rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.b-ov{background:#ef4444;color:#fff}
.b-wn{background:#f59e0b;color:#fff}
.b-dn{background:#22c55e;color:#fff}
.b-nm{background:#94a3b8;color:#fff}
.exp-steps{padding:6px 8px;display:flex;flex-direction:column;gap:4px}
.exp-step{display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:6px;border:1px solid var(--border);background:#fff;font-size:.83rem}
.exp-step.s-ov{background:#fef2f2;border-color:#fca5a5}
.exp-step.s-wn{background:#fffbeb;border-color:#fde68a}
.exp-step.s-dn{background:#f0fdf4;border-color:#bbf7d0}
.s-chk{width:18px;height:18px;border-radius:4px;border:2px solid #cbd5e1;
  display:flex;align-items:center;justify-content:center;font-size:.62rem;flex-shrink:0}
.s-chk.ov{border-color:#ef4444}
.s-chk.wn{border-color:#f59e0b}
.s-chk.dn{background:#22c55e;border-color:#22c55e;color:#fff}
.s-body{flex:1;min-width:0}
.s-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-name.dn{text-decoration:line-through;color:#16a34a}
.s-owner{font-size:.7rem;color:var(--text-muted);margin-top:1px}
.s-tag{font-size:.67rem;padding:2px 7px;border-radius:8px;font-weight:700;white-space:nowrap;flex-shrink:0}
.t-ov{background:#ef4444;color:#fff}
.t-wn{background:#f59e0b;color:#fff}
.t-dn{background:#22c55e;color:#fff}

/* Legend */
.legend{display:flex;gap:12px;padding:12px 16px;flex-wrap:wrap;
  border-top:1px solid var(--border);background:#f8fafc;border-radius:0 0 10px 10px}
.leg{display:flex;align-items:center;gap:5px;font-size:.73rem;color:var(--text-sub)}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* ===== Mobile card view ===== */
.mobile-cards{display:none;flex-direction:column;gap:10px}
.mc{background:#fff;border-radius:10px;border:1px solid var(--border);
  box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
.mc-hd{padding:14px 14px 12px;-webkit-tap-highlight-color:transparent;user-select:none;cursor:pointer}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.mc-name{font-size:.95rem;font-weight:700;flex:1;line-height:1.35}
.mc-pbar{background:#e2e8f0;border-radius:4px;height:6px;margin-bottom:7px}
.mc-pbar-fill{height:100%;border-radius:4px;background:#22c55e;transition:width .4s}
.mc-pct{font-size:.72rem;color:var(--text-sub);font-weight:500;margin-bottom:10px}
.mc-phases{display:flex;gap:3px}
.mc-ph{flex:1;height:30px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:.58rem;font-weight:700;border:1px solid transparent;
  overflow:hidden;white-space:nowrap;cursor:default}
.mc-toggle{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid #f1f5f9;font-size:.82rem;color:var(--primary);cursor:pointer;
  font-weight:500;-webkit-tap-highlight-color:transparent;user-select:none}
.mc-chevron{transition:transform .2s;color:var(--text-muted);font-size:.7rem}
.mc.mc-open .mc-chevron{transform:rotate(180deg)}
.mc-body{display:none;border-top:1px solid var(--border);padding:10px}
.mc.mc-open .mc-body{display:block}

/* Mobile */
@media(max-width:640px){
  :root{--label-w:90px;--day-px:28px;--bar-h:26px;--row-v:8px}
  header{height:auto;min-height:48px;padding:8px 12px;flex-wrap:wrap;gap:6px;top:0}
  .gantt-header{top:0}
  .h-title{font-size:.9rem}
  .h-right{gap:6px}
  .conn-badge,.update-time{display:none}
  .board-wrap{padding:8px}
  .exp-g-hd{flex-direction:column;gap:3px}
  .exp-step{padding:10px}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">載入進度看板...</div>
</div>

<header>
  <div class="h-title">心選<em>叫貨進度</em>看板</div>
  <div class="h-right">
    <span class="conn-badge conn-wait" id="connBadge">● 連線中</span>
    <span class="update-time" id="updateTime"></span>
    <a href="index.html" class="h-link">⚙ 後台管理</a>
  </div>
</header>

<div class="board-wrap">
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🎉</div>
    <p>目前沒有進行中的場次<br>所有叫貨流程均已結案</p>
  </div>
  <div class="board" id="board" style="display:none"></div>
  <div class="mobile-cards" id="mobileCards" style="display:none"></div>
</div>

<script>
const SUPA_URL='https://ijnjfpxthoewpwyuzela.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbmpmcHh0aG9ld3B3eXV6ZWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTc4MDksImV4cCI6MjA5MTc5MzgwOX0.kiyAtaVDUFlaV1pWzAMGyfdMuh4GScO8o47CtjnRYy8';
const{createClient}=window.supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

let appData={sopTemplates:[],sessions:[]};
let expandedIds=new Set();
let mobileExpandedIds=new Set();
const DAY_MS=86400000;
const WD=['日','一','二','三','四','五','六'];

/* ── abbrev group names ─────────────────────── */
function abbr(name){
  const map={'叫貨準備作業':'叫貨','廠商出貨確認':'廠商','商品品質確認（QC）':'QC',
    '台灣出貨準備':'台灣準備','台灣收貨確認':'收貨','台灣包裝場清點':'清點','出貨至客戶':'出貨'};
  return map[name]||(name.length>4?name.slice(0,4)+'…':name);
}

/* ── data loading ───────────────────────────── */
async function loadData(){
  const[tplR,grpR,stpR,sesR,prR]=await Promise.all([
    db.from('sop_templates').select('*').order('sort_order'),
    db.from('sop_groups').select('*').order('offset_hours'),
    db.from('sop_steps').select('*').order('sort_order'),
    db.from('sessions').select('*').order('live_date',{ascending:true}),
    db.from('session_progress').select('*')
  ]);
  const templates=tplR.data||[],groups=grpR.data||[],steps=stpR.data||[],sessions=sesR.data||[],progress=prR.data||[];
  appData.sopTemplates=templates.map(t=>({
    templateId:t.id,name:t.name,
    groups:groups.filter(g=>g.template_id===t.id).map(g=>({
      groupId:g.id,groupName:g.group_name,offsetHours:parseFloat(g.offset_hours),
      steps:steps.filter(s=>s.group_id===g.id)
        .sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))
        .map(s=>({stepId:s.id,name:s.name,owner:s.owner||'',order:s.sort_order}))
    }))
  }));
  appData.sessions=sessions.map(s=>{
    const prog={};
    progress.filter(p=>p.session_id===s.id&&p.completed)
      .forEach(p=>{prog[p.step_id]={completed:true,completedAt:p.completed_at};});
    return{sessionId:s.id,name:s.name,liveDate:s.live_date,sopTemplateId:s.sop_template_id,progress:prog};
  });
  const p=n=>String(n).padStart(2,'0');
  const now=new Date();
  document.getElementById('updateTime').textContent=
    `更新：${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}
function getSessionTemplate(session){
  return appData.sopTemplates.find(t=>t.templateId===session?.sopTemplateId)||appData.sopTemplates[0]||{groups:[]};
}
function getSessionGroups(session){
  return [...(getSessionTemplate(session).groups||[])].sort((a,b)=>a.offsetHours-b.offsetHours);
}

/* ── status helpers ─────────────────────────── */
function stepStatus(stepId,group,session){
  const prog=session.progress[stepId];
  if(prog?.completed)return{s:'DONE',at:prog.completedAt};
  const deadline=new Date(session.liveDate).getTime()+group.offsetHours*3600000,now=Date.now();
  if(now>deadline)return{s:'OVERDUE',h:(now-deadline)/3600000};
  if(deadline-now<4*3600000)return{s:'WARN',h:(deadline-now)/3600000};
  return{s:'OK'};
}
function groupStatus(group,session){
  const steps=group.steps||[];
  if(!steps.length)return'FUTURE';
  let done=0,ov=false,wn=false;
  for(const st of steps){
    const r=stepStatus(st.stepId,group,session);
    if(r.s==='DONE')done++;
    else if(r.s==='OVERDUE')ov=true;
    else if(r.s==='WARN')wn=true;
  }
  if(done===steps.length)return'DONE';
  if(ov)return'OVERDUE';
  if(wn)return'WARN';
  return'OK';
}
function isSessionDone(session){
  const groups=getSessionGroups(session);
  const total=groups.reduce((n,g)=>n+g.steps.length,0);
  if(!total)return false;
  return groups.every(g=>g.steps.every(st=>session.progress[st.stepId]?.completed));
}

/* ── formatters ─────────────────────────────── */
function fmtMD(d){const p=n=>String(n).padStart(2,'0');return`${p(d.getMonth()+1)}/${p(d.getDate())}`;}
function fmtDt(iso){
  const d=new Date(iso),p=n=>String(n).padStart(2,'0');
  return`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtShort(iso){
  const d=new Date(iso),p=n=>String(n).padStart(2,'0');
  return`${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtDur(h){
  const m=Math.round(h*60),hr=Math.floor(m/60),mi=m%60;
  if(hr===0)return`${mi}分`;
  if(hr<24)return mi>0?`${hr}時${mi}分`:`${hr}小時`;
  const d=Math.floor(hr/24),rh=hr%24;
  return rh===0?`${d}天`:`${d}天${rh}時`;
}
function fmtOffset(h){return h%24===0?`${h/24}天後`:`${h}小時後`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── day label ─────────────────────────────── */
function dayLabel(liveDate){
  const todayMs=Math.floor(Date.now()/DAY_MS)*DAY_MS;
  const liveMs=Math.floor(new Date(liveDate).getTime()/DAY_MS)*DAY_MS;
  const diff=Math.round((todayMs-liveMs)/DAY_MS);
  if(diff===0)return{text:'📅 直播日',cls:'d-live'};
  if(diff<0)return{text:`直播前 ${-diff} 天`,cls:'d-future'};
  return{text:`第 ${diff+1} 天`,cls:'d-normal'};
}

/* ── bar color class ───────────────────────── */
function barClass(group,session,phaseStartTs,phaseEndTs){
  const gs=groupStatus(group,session);
  if(gs==='DONE')return'bc-done';
  if(gs==='OVERDUE')return'bc-overdue';
  if(gs==='WARN')return'bc-warn';
  if(phaseStartTs>Date.now())return'bc-future';
  return'bc-normal';
}

/* ── mobile card render ─────────────────────── */
function renderMobileCards(active){
  const mCards=document.getElementById('mobileCards');
  mCards.style.display='flex';
  const colMap={
    'bc-done':'background:#bbf7d0;border-color:#4ade80;color:#166534',
    'bc-overdue':'background:#fca5a5;border-color:#f87171;color:#991b1b',
    'bc-warn':'background:#fde68a;border-color:#fbbf24;color:#854d0e',
    'bc-normal':'background:#bfdbfe;border-color:#93c5fd;color:#1e40af',
    'bc-future':'background:#e2e8f0;border-color:#cbd5e1;color:#94a3b8'
  };
  mCards.innerHTML=active.map(session=>{
    const sortedGroups=getSessionGroups(session);
    const liveTs=new Date(session.liveDate).getTime();
    const dl=dayLabel(session.liveDate);
    const hasOv=sortedGroups.some(g=>g.steps.some(st=>stepStatus(st.stepId,g,session).s==='OVERDUE'));
    const hasWn=!hasOv&&sortedGroups.some(g=>g.steps.some(st=>stepStatus(st.stepId,g,session).s==='WARN'));
    const dayCls=hasOv?'d-overdue':hasWn?'d-warn':dl.cls;
    let total=0,done=0;
    for(const g of sortedGroups)for(const st of g.steps){total++;if(session.progress[st.stepId]?.completed)done++;}
    const pct=total?Math.round(done/total*100):0;
    const phases=sortedGroups.map((g,i)=>{
      const prev=i>0?sortedGroups[i-1].offsetHours:0;
      const cls=barClass(g,session,liveTs+prev*3600000,liveTs+g.offsetHours*3600000);
      return`<div class="mc-ph" style="${colMap[cls]||colMap['bc-future']}" title="${esc(g.groupName)}">${abbr(g.groupName)}</div>`;
    }).join('');
    const isOpen=mobileExpandedIds.has(session.sessionId);
    return`<div class="mc${isOpen?' mc-open':''}">
      <div class="mc-hd" onclick="toggleMobileCard('${session.sessionId}')">
        <div class="mc-top">
          <div class="mc-name">${esc(session.name)}</div>
          <span class="rl-day ${dayCls}" style="font-size:.72rem;flex-shrink:0">${dl.text}</span>
        </div>
        <div style="font-size:.73rem;color:var(--text-muted);margin-bottom:9px">📅 ${fmtDt(session.liveDate)}</div>
        <div class="mc-pbar"><div class="mc-pbar-fill" style="width:${pct}%"></div></div>
        <div class="mc-pct">${done} / ${total} 步驟完成（${pct}%）</div>
        <div class="mc-phases">${phases}</div>
      </div>
      <div class="mc-toggle" onclick="toggleMobileCard('${session.sessionId}')">
        <span>${isOpen?'▲ 收起步驟':'▼ 展開步驟詳情'}</span>
        <span class="mc-chevron">▼</span>
      </div>
      ${isOpen?`<div class="mc-body">${renderExpand(session,getSessionGroups(session))}</div>`:''}
    </div>`;
  }).join('');
}
function toggleMobileCard(sid){
  if(mobileExpandedIds.has(sid))mobileExpandedIds.delete(sid);
  else mobileExpandedIds.add(sid);
  renderMobileCards(appData.sessions.filter(s=>!isSessionDone(s)));
}

/* ── main render ────────────────────────────── */
function render(){
  const active=appData.sessions.filter(s=>!isSessionDone(s));
  const board=document.getElementById('board');
  const mCards=document.getElementById('mobileCards');
  const empty=document.getElementById('emptyState');
  if(!active.length){board.style.display='none';mCards.style.display='none';empty.style.display='flex';return;}
  empty.style.display='none';
  if(window.innerWidth<=640){board.style.display='none';renderMobileCards(active);return;}
  mCards.style.display='none';
  board.style.display='block';

  /* X-axis range (snap to day boundaries) — per-session templates */
  const liveTimes=active.map(s=>new Date(s.liveDate).getTime());
  const endTimes=active.map(s=>{
    const grps=getSessionGroups(s);
    const maxOff=grps.length?grps[grps.length-1].offsetHours:336;
    return new Date(s.liveDate).getTime()+maxOff*3600000;
  });
  const xMinRaw=Math.min(...liveTimes,Date.now()-DAY_MS);
  const xMaxRaw=Math.max(...endTimes,Date.now()+DAY_MS);
  const xMin=Math.floor(xMinRaw/DAY_MS)*DAY_MS;
  const xMax=Math.ceil(xMaxRaw/DAY_MS)*DAY_MS+DAY_MS;
  const totalDays=Math.round((xMax-xMin)/DAY_MS);
  const DAY_PX=window.innerWidth<=640?36:48;
  const totalW=totalDays*DAY_PX;

  function toX(ts){return(ts-xMin)/DAY_MS*DAY_PX;}
  const todayX=toX(Date.now());

  /* ── date header ── */
  let ticks='';
  for(let i=0;i<totalDays;i++){
    const d=new Date(xMin+i*DAY_MS);
    const x=i*DAY_PX;
    const wd=d.getDay();
    const isToday=fmtMD(d)===fmtMD(new Date());
    const isWknd=wd===0||wd===6;
    ticks+=`<div class="date-tick${isToday?' is-today':isWknd?' is-weekend':''}" style="left:${x}px;width:${DAY_PX}px">
      <span class="dt-day">${fmtMD(d)}</span><span class="dt-wd">${WD[wd]}</span>
    </div>`;
  }

  /* ── session rows ── */
  let rows='';
  for(const session of active){
    const sortedGroups=getSessionGroups(session);
    const liveTs=new Date(session.liveDate).getTime();
    const dl=dayLabel(session.liveDate);
    const hasOv=sortedGroups.some(g=>g.steps.some(st=>stepStatus(st.stepId,g,session).s==='OVERDUE'));
    const hasWn=!hasOv&&sortedGroups.some(g=>g.steps.some(st=>stepStatus(st.stepId,g,session).s==='WARN'));
    const dayCls=hasOv?'d-overdue':hasWn?'d-warn':dl.cls;

    /* bars */
    let barsHtml='';
    for(let i=0;i<sortedGroups.length;i++){
      const g=sortedGroups[i];
      const prevOffset=i>0?sortedGroups[i-1].offsetHours:0;
      const barStart=liveTs+prevOffset*3600000;
      const barEnd=liveTs+g.offsetHours*3600000;
      const bx=toX(barStart);
      const bw=Math.max(4,toX(barEnd)-bx-1);
      const cls=barClass(g,session,barStart,barEnd);
      barsHtml+=`<div class="phase-bar ${cls}" style="left:${bx}px;width:${bw}px">
        <span class="bar-lbl">${abbr(g.groupName)}</span>
      </div>`;
    }
    barsHtml+=`<div class="today-line" style="left:${todayX}px"></div>`;

    const isExp=expandedIds.has(session.sessionId);
    rows+=`<div class="gantt-row${isExp?' expanded':''}" onclick="toggleExpand('${session.sessionId}')">
      <div class="row-label">
        <div class="rl-name">${esc(session.name)}</div>
        <div class="rl-date">📅 ${fmtMD(new Date(session.liveDate))}</div>
        <span class="rl-day ${dayCls}">${dl.text}</span>
        <span class="rl-chevron">▼</span>
      </div>
      <div class="row-bars" style="min-width:${totalW}px">${barsHtml}</div>
    </div>
    <div class="expand-panel${isExp?' open':''}" id="exp-${session.sessionId}">
      <div class="expand-inner">${renderExpand(session,getSessionGroups(session))}</div>
    </div>`;
  }

  /* ── legend ── */
  const legend=`<div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#bbf7d0;border:1px solid #4ade80"></div>已完成</div>
    <div class="leg"><div class="leg-dot" style="background:#fca5a5;border:1px solid #f87171"></div>逾期未完成</div>
    <div class="leg"><div class="leg-dot" style="background:#fde68a;border:1px solid #fbbf24"></div>即將截止（4小時內）</div>
    <div class="leg"><div class="leg-dot" style="background:#bfdbfe;border:1px solid #93c5fd"></div>進行中</div>
    <div class="leg"><div class="leg-dot" style="background:#e2e8f0;border:1px solid #cbd5e1"></div>尚未開始</div>
    <div class="leg" style="margin-left:auto"><span style="color:#ef4444;font-size:.8rem">│</span>&nbsp;今天</div>
  </div>`;

  board.innerHTML=`
    <div class="gantt-header">
      <div class="header-label">場次</div>
      <div class="header-dates" style="min-width:${totalW}px;height:44px">
        ${ticks}
        <div class="header-today-line" style="left:${todayX}px"></div>
      </div>
    </div>
    ${rows}
    ${legend}`;
}

/* ── expand detail ──────────────────────────── */
function renderExpand(session,sortedGroups){
  return sortedGroups.map((g,i)=>{
    const gs=groupStatus(g,session);
    const[bc,bt]={DONE:['b-dn','✓ 完成'],OVERDUE:['b-ov','⚠ 逾期'],WARN:['b-wn','⏰ 即將'],
      OK:['b-nm','進行中'],FUTURE:['b-nm','未開始']}[gs]||['b-nm','進行中'];
    const steps=[...g.steps].sort((a,b)=>(a.order||0)-(b.order||0));
    const stepsHtml=steps.map(st=>{
      const r=stepStatus(st.stepId,g,session);
      let ic='',cc='',nc='',tag='';
      if(r.s==='DONE'){ic='✓';cc='dn';nc='dn';
        tag=`<span class="s-tag t-dn">✓ ${fmtShort(r.at)}</span>`;}
      else if(r.s==='OVERDUE'){cc='ov';
        tag=`<span class="s-tag t-ov">⚠ ${fmtDur(r.h)}</span>`;}
      else if(r.s==='WARN'){cc='wn';
        tag=`<span class="s-tag t-wn">⏰ ${fmtDur(r.h)}後</span>`;}
      return`<div class="exp-step${r.s==='OVERDUE'?' s-ov':r.s==='WARN'?' s-wn':r.s==='DONE'?' s-dn':''}">
        <div class="s-chk ${cc}">${ic}</div>
        <div class="s-body">
          <div class="s-name ${nc}">${esc(st.name)}</div>
          ${st.owner?`<div class="s-owner">👤 ${esc(st.owner)}</div>`:''}
        </div>
        ${tag}
      </div>`;
    }).join('');
    const deadline=new Date(new Date(session.liveDate).getTime()+g.offsetHours*3600000);
    return`<div class="exp-group">
      <div class="exp-g-hd">
        <div>
          <div class="exp-g-title">第 ${i+1} 組：${esc(g.groupName)}</div>
          <div class="exp-g-dl">截止：${fmtDt(deadline.toISOString())}（直播 ${fmtOffset(g.offsetHours)}）</div>
        </div>
        <span class="badge ${bc}">${bt}</span>
      </div>
      <div class="exp-steps">${stepsHtml||'<div style="padding:8px;font-size:.8rem;color:var(--text-muted)">此組無步驟</div>'}</div>
    </div>`;
  }).join('');
}

function toggleExpand(sid){
  if(expandedIds.has(sid))expandedIds.delete(sid);
  else expandedIds.add(sid);
  render();
}

/* ── realtime ───────────────────────────────── */
function setupRealtime(){
  const reload=()=>loadData().then(render);
  db.channel('gantt-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'sop_templates'},reload)
    .on('postgres_changes',{event:'*',schema:'public',table:'sop_groups'},reload)
    .on('postgres_changes',{event:'*',schema:'public',table:'sop_steps'},reload)
    .on('postgres_changes',{event:'*',schema:'public',table:'sessions'},reload)
    .on('postgres_changes',{event:'*',schema:'public',table:'session_progress'},reload)
    .subscribe(status=>{
      const b=document.getElementById('connBadge');
      if(status==='SUBSCRIBED'){b.textContent='● 即時同步';b.className='conn-badge conn-ok';}
      else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){b.textContent='● 連線中斷';b.className='conn-badge conn-err';}
      else{b.textContent='● 連線中';b.className='conn-badge conn-wait';}
    });
}

function hideLoading(){
  const el=document.getElementById('loadingOverlay');
  if(el){el.style.opacity='0';el.style.transition='opacity .4s';setTimeout(()=>el.remove(),400);}
}

/* ── init ───────────────────────────────────── */
(async()=>{
  await loadData();
  hideLoading();
  render();
  setupRealtime();
  setInterval(()=>loadData().then(render),30000);
})();
</script>
